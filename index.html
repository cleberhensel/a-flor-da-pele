<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>À Flor da Pele — Raphael Rabello & Ney Matogrosso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --peach: #e8a090;
      --peach-soft: rgba(232, 160, 144, 0.55);
      --peach-glow: rgba(232, 160, 144, 0.18);
      --ink: #0a0a0c;
      --glass: rgba(8, 8, 12, 0.42);
      --glass-strong: rgba(6, 6, 10, 0.62);
      --glass-border: rgba(232, 160, 144, 0.14);
      --text: #f5ebe6;
      --muted: rgba(245, 235, 230, 0.55);
      --vocals: #e8a090;
      --vocals-dim: rgba(232, 160, 144, 0.12);
      --guitar: #c9b896;
      --guitar-dim: rgba(201, 184, 150, 0.12);
      --accent: #e8a090;
      --player-h: 112px;
    }

    html, body { height: 100%; }

    body {
      font-family: "Outfit", system-ui, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: var(--ink);
    }

    /* —— Fundo: capa 100% + desfoque —— */
    .scene {
      position: relative;
      min-height: 100vh;
      padding-bottom: var(--player-h);
    }

    .bg-blur {
      position: fixed;
      inset: -8%;
      z-index: 0;
      background: url("assets/capa.jpg") center center / cover no-repeat;
      filter: blur(42px) saturate(1.15) brightness(0.45);
      transform: scale(1.08);
      pointer-events: none;
    }

    .bg-cover {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: url("assets/capa.jpg") center center / contain no-repeat;
      opacity: 0.92;
      pointer-events: none;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse 80% 60% at 50% 40%, transparent 0%, rgba(0,0,0,.35) 70%, rgba(0,0,0,.72) 100%),
        linear-gradient(180deg, rgba(0,0,0,.25) 0%, rgba(0,0,0,.5) 55%, rgba(0,0,0,.82) 100%);
      pointer-events: none;
    }

    /* —— Ondas suaves —— */
    .waves {
      position: fixed;
      bottom: calc(var(--player-h) - 2px);
      left: 0;
      right: 0;
      height: 140px;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.35;
    }

    .waves svg {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 100%;
      animation: wave-drift 28s linear infinite;
    }

    .waves .w2 {
      animation-duration: 36s;
      animation-direction: reverse;
      opacity: 0.5;
    }

    @keyframes wave-drift {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* —— Layout —— */
    .app {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(250px, 310px) 1fr;
      min-height: calc(100vh - var(--player-h));
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 0;
      gap: 1rem;
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.25);
      -webkit-backdrop-filter: blur(20px) saturate(1.25);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.28);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar header {
      padding: 1.35rem 1.2rem 1rem;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      gap: .85rem;
      align-items: flex-start;
    }

    .cover-thumb {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      box-shadow: 0 4px 16px rgba(0,0,0,.45);
      flex-shrink: 0;
      border: 1px solid var(--glass-border);
    }

    .sidebar h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.45rem;
      font-weight: 600;
      font-style: italic;
      line-height: 1.15;
      color: var(--peach);
      letter-spacing: .01em;
    }

    .sidebar .artists {
      color: var(--muted);
      font-size: .78rem;
      font-weight: 300;
      margin-top: .3rem;
      line-height: 1.35;
    }

    .sidebar .year {
      color: rgba(232,160,144,.45);
      font-size: .68rem;
      margin-top: .25rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .track-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: .5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--peach-glow) transparent;
    }

    .track-list li {
      display: grid;
      grid-template-columns: 26px 1fr auto;
      gap: .6rem;
      align-items: center;
      padding: .5rem .6rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, transform .12s;
    }

    .track-list li:hover {
      background: rgba(232,160,144,.08);
    }

    .track-list li.active {
      background: rgba(232,160,144,.14);
      border: 1px solid rgba(232,160,144,.2);
    }

    .track-list li.active .track-title { color: var(--peach); }

    .track-num {
      color: var(--muted);
      font-size: .75rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .track-title {
      font-size: .84rem;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-dur {
      color: var(--muted);
      font-size: .7rem;
      font-variant-numeric: tabular-nums;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }

    .now-title {
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .now-title h2 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
    }

    .now-title p {
      color: var(--muted);
      font-size: .8rem;
      margin-top: .25rem;
      font-weight: 300;
    }

    .stems-split {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 260px;
    }

    .stem-panel {
      display: flex;
      flex-direction: column;
      padding: 1rem 1.15rem 1.15rem;
      position: relative;
      overflow: hidden;
    }

    .stem-panel.vocals {
      border-right: 1px solid var(--glass-border);
      background: linear-gradient(165deg, var(--vocals-dim) 0%, transparent 60%);
    }

    .stem-panel.guitar {
      background: linear-gradient(195deg, var(--guitar-dim) 0%, transparent 60%);
    }

    .stem-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      margin-bottom: .7rem;
    }

    .stem-label {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .03em;
    }

    .stem-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
    }

    .vocals .stem-dot { background: var(--vocals); color: var(--vocals); }
    .guitar .stem-dot { background: var(--guitar); color: var(--guitar); }

    .stem-actions {
      display: flex;
      align-items: center;
      gap: .45rem;
    }

    .btn-mute {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--glass-border);
      color: var(--text);
      border-radius: 999px;
      padding: .28rem .7rem;
      font-size: .74rem;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      font-family: inherit;
    }

    .btn-mute:hover { background: rgba(232,160,144,.12); }
    .btn-mute.muted { opacity: .5; text-decoration: line-through; }

    .stem-vol {
      width: 68px;
      accent-color: var(--peach);
      cursor: pointer;
      opacity: .85;
    }

    .meter-wrap {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      min-height: 110px;
      padding: .4rem 0;
    }

    .meter-bar {
      flex: 1;
      background: rgba(255,255,255,.06);
      border-radius: 3px 3px 0 0;
      min-height: 4px;
      transition: height .05s linear, background .1s;
    }

    .vocals .meter-bar.active {
      background: linear-gradient(180deg, var(--peach), rgba(232,160,144,.4));
      box-shadow: 0 0 8px var(--peach-glow);
    }

    .guitar .meter-bar.active {
      background: linear-gradient(180deg, var(--guitar), rgba(201,184,150,.35));
    }

    .stem-status {
      color: var(--muted);
      font-size: .72rem;
      margin-top: .45rem;
      font-weight: 300;
    }

    /* —— Player bar —— */
    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--player-h);
      z-index: 50;
      background: var(--glass-strong);
      backdrop-filter: blur(24px) saturate(1.3);
      -webkit-backdrop-filter: blur(24px) saturate(1.3);
      border-top: 1px solid var(--glass-border);
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .np-mini {
      display: flex;
      align-items: center;
      gap: .7rem;
      min-width: 0;
    }

    .np-badge {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 12px rgba(0,0,0,.35);
    }

    .np-badge img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .np-text { min-width: 0; }
    .np-text .t {
      font-size: .84rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .np-text .s {
      font-size: .7rem;
      color: var(--muted);
      font-weight: 300;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .ctrl-btns {
      display: flex;
      align-items: center;
      gap: .85rem;
    }

    .btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .12s, transform .1s;
    }

    .btn:hover { color: var(--peach); }
    .btn:active { transform: scale(.92); }
    .btn svg { width: 18px; height: 18px; fill: currentColor; }

    .btn-play {
      width: 44px;
      height: 44px;
      background: var(--peach);
      color: var(--ink);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--peach-glow);
    }

    .btn-play:hover {
      background: #f0b0a0;
      color: var(--ink);
      transform: scale(1.05);
    }

    .btn-play svg { width: 20px; height: 20px; }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: .5rem;
      width: 100%;
    }

    .time {
      font-size: .68rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 34px;
    }

    .time.end { text-align: right; }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar:hover { height: 6px; }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--peach), #f0c4b8);
      border-radius: 2px;
      pointer-events: none;
      box-shadow: 0 0 8px var(--peach-glow);
    }

    .mix-hint {
      text-align: right;
      font-size: .7rem;
      color: var(--muted);
      font-weight: 300;
    }

    .mix-hint span { color: var(--peach); }

    .loading {
      padding: 2rem;
      color: var(--muted);
      text-align: center;
      font-weight: 300;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        padding: .75rem .75rem 0;
      }
      .sidebar { max-height: 240px; }
      .stems-split { grid-template-columns: 1fr; }
      .stem-panel.vocals { border-right: none; border-bottom: 1px solid var(--glass-border); }
      .bg-cover { background-size: 90% auto; }
      .player {
        grid-template-columns: 1fr;
        height: auto;
        padding: .75rem 1rem 1rem;
        gap: .5rem;
      }
      .mix-hint { display: none; }
      .np-mini { justify-content: center; }
      .waves { height: 80px; opacity: .22; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bg-blur" aria-hidden="true"></div>
    <div class="bg-cover" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>

    <div class="waves" aria-hidden="true">
      <svg class="w1" viewBox="0 0 1440 120" preserveAspectRatio="none">
        <path fill="rgba(232,160,144,0.12)" d="M0,64 C240,100 480,20 720,56 C960,92 1200,36 1440,72 L1440,120 L0,120 Z"/>
        <path fill="rgba(232,160,144,0.08)" d="M0,80 C200,48 400,96 600,64 C800,32 1100,88 1440,56 L1440,120 L0,120 Z"/>
      </svg>
      <svg class="w2" viewBox="0 0 1440 120" preserveAspectRatio="none">
        <path fill="rgba(201,184,150,0.1)" d="M0,72 C360,40 540,96 900,60 C1080,44 1260,84 1440,68 L1440,120 L0,120 Z"/>
      </svg>
    </div>

    <div class="app">
      <aside class="sidebar glass">
        <header>
          <img class="cover-thumb" src="assets/capa.jpg" alt="Capa do álbum À Flor da Pele" width="64" height="64">
          <div>
            <h1 id="album-title">À Flor da Pele</h1>
            <p class="artists" id="album-artists">Raphael Rabello & Ney Matogrosso</p>
            <p class="year">Som Livre · 1990</p>
          </div>
        </header>
        <ul class="track-list" id="track-list">
          <li class="loading">A carregar faixas…</li>
        </ul>
      </aside>

      <div class="main glass">
        <div class="now-title">
          <h2 id="track-title">Selecione uma faixa</h2>
          <p id="track-sub">Voz e violão em stems separados — tocam em simultâneo</p>
        </div>

        <div class="stems-split">
          <section class="stem-panel vocals" aria-label="Canal de voz">
            <div class="stem-head">
              <div class="stem-label">
                <span class="stem-dot"></span>
                Voz
              </div>
              <div class="stem-actions">
                <button type="button" class="btn-mute" id="mute-vocals" aria-pressed="false">Mudo</button>
                <input type="range" class="stem-vol" id="vol-vocals" min="0" max="1" step="0.01" value="1" aria-label="Volume voz">
              </div>
            </div>
            <div class="meter-wrap" id="meter-vocals" aria-hidden="true"></div>
            <p class="stem-status" id="status-vocals">Aguardando faixa</p>
          </section>

          <section class="stem-panel guitar" aria-label="Canal de violão">
            <div class="stem-head">
              <div class="stem-label">
                <span class="stem-dot"></span>
                Violão
              </div>
              <div class="stem-actions">
                <button type="button" class="btn-mute" id="mute-guitar" aria-pressed="false">Mudo</button>
                <input type="range" class="stem-vol" id="vol-guitar" min="0" max="1" step="0.01" value="1" aria-label="Volume violão">
              </div>
            </div>
            <div class="meter-wrap" id="meter-guitar" aria-hidden="true"></div>
            <p class="stem-status" id="status-guitar">Aguardando faixa</p>
          </section>
        </div>
      </div>
    </div>

    <div class="player">
      <div class="np-mini">
        <div class="np-badge" aria-hidden="true">
          <img src="assets/capa.jpg" alt="">
        </div>
        <div class="np-text">
          <div class="t" id="np-title">—</div>
          <div class="s" id="np-stems">Voz + Violão</div>
        </div>
      </div>

      <div class="controls">
        <div class="ctrl-btns">
          <button class="btn" id="btn-prev" type="button" aria-label="Anterior">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="btn btn-play" id="btn-play" type="button" aria-label="Play">
            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="btn" id="btn-next" type="button" aria-label="Próxima">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
        </div>
        <div class="progress-wrap">
          <span class="time" id="time-current">0:00</span>
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="time end" id="time-total">0:00</span>
        </div>
      </div>

      <div class="mix-hint">
        Mix: <span id="mix-label">Voz + Violão</span>
      </div>
    </div>
  </div>

  <script>
    const METER_BARS = 24;
    const SYNC_THRESHOLD = 0.04;

    let manifest = null;
    let currentIndex = -1;
    let duration = 0;
    let rafId = null;

    const vocalsEl = new Audio();
    const guitarEl = new Audio();
    vocalsEl.preload = "auto";
    guitarEl.preload = "auto";

    let audioCtx = null;
    let vocalsAnalyser = null;
    let guitarAnalyser = null;

    const els = {
      trackList: document.getElementById("track-list"),
      trackTitle: document.getElementById("track-title"),
      trackSub: document.getElementById("track-sub"),
      npTitle: document.getElementById("np-title"),
      npStems: document.getElementById("np-stems"),
      mixLabel: document.getElementById("mix-label"),
      btnPlay: document.getElementById("btn-play"),
      btnPrev: document.getElementById("btn-prev"),
      btnNext: document.getElementById("btn-next"),
      iconPlay: document.getElementById("icon-play"),
      iconPause: document.getElementById("icon-pause"),
      progressBar: document.getElementById("progress-bar"),
      progressFill: document.getElementById("progress-fill"),
      timeCurrent: document.getElementById("time-current"),
      timeTotal: document.getElementById("time-total"),
      muteVocals: document.getElementById("mute-vocals"),
      muteGuitar: document.getElementById("mute-guitar"),
      volVocals: document.getElementById("vol-vocals"),
      volGuitar: document.getElementById("vol-guitar"),
      statusVocals: document.getElementById("status-vocals"),
      statusGuitar: document.getElementById("status-guitar"),
      meterVocals: document.getElementById("meter-vocals"),
      meterGuitar: document.getElementById("meter-guitar"),
      albumTitle: document.getElementById("album-title"),
      albumArtists: document.getElementById("album-artists"),
    };

    const vocalsBars = buildMeter(els.meterVocals);
    const guitarBars = buildMeter(els.meterGuitar);

    function buildMeter(container) {
      container.innerHTML = "";
      const bars = [];
      for (let i = 0; i < METER_BARS; i++) {
        const bar = document.createElement("div");
        bar.className = "meter-bar";
        bar.style.height = "4px";
        container.appendChild(bar);
        bars.push(bar);
      }
      return bars;
    }

    function formatTime(s) {
      if (!s || !isFinite(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ":" + String(sec).padStart(2, "0");
    }

    function enc(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function updateMixLabel() {
      const parts = [];
      if (!vocalsEl.muted && els.volVocals.value > 0) parts.push("Voz");
      if (!guitarEl.muted && els.volGuitar.value > 0) parts.push("Violão");
      const label = parts.length ? parts.join(" + ") : "Silêncio";
      els.mixLabel.textContent = label;
      els.npStems.textContent = label;
    }

    function setPlayIcon(playing) {
      els.iconPlay.style.display = playing ? "none" : "block";
      els.iconPause.style.display = playing ? "block" : "none";
    }

    async function ensureAudioGraph() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const vSource = audioCtx.createMediaElementSource(vocalsEl);
      const gSource = audioCtx.createMediaElementSource(guitarEl);

      vocalsAnalyser = audioCtx.createAnalyser();
      guitarAnalyser = audioCtx.createAnalyser();
      vocalsAnalyser.fftSize = 64;
      guitarAnalyser.fftSize = 64;

      const vGain = audioCtx.createGain();
      const gGain = audioCtx.createGain();

      vSource.connect(vocalsAnalyser);
      vocalsAnalyser.connect(vGain);
      vGain.connect(audioCtx.destination);

      gSource.connect(guitarAnalyser);
      guitarAnalyser.connect(gGain);
      gGain.connect(audioCtx.destination);

      vocalsEl._gain = vGain;
      guitarEl._gain = gGain;
    }

    function applyStemGain() {
      if (vocalsEl._gain) {
        vocalsEl._gain.gain.value = vocalsEl.muted ? 0 : Number(els.volVocals.value);
      } else {
        vocalsEl.volume = vocalsEl.muted ? 0 : Number(els.volVocals.value);
      }
      if (guitarEl._gain) {
        guitarEl._gain.gain.value = guitarEl.muted ? 0 : Number(els.volGuitar.value);
      } else {
        guitarEl.volume = guitarEl.muted ? 0 : Number(els.volGuitar.value);
      }
      updateMixLabel();
    }

    function updateMuteButtons() {
      els.muteVocals.classList.toggle("muted", vocalsEl.muted);
      els.muteGuitar.classList.toggle("muted", guitarEl.muted);
      els.muteVocals.setAttribute("aria-pressed", String(vocalsEl.muted));
      els.muteGuitar.setAttribute("aria-pressed", String(guitarEl.muted));
      els.muteVocals.textContent = vocalsEl.muted ? "Mudo ✓" : "Mudo";
      els.muteGuitar.textContent = guitarEl.muted ? "Mudo ✓" : "Mudo";
    }

    function paintMeter(analyser, bars) {
      if (!analyser) return;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const step = Math.floor(data.length / bars.length);
      bars.forEach((bar, i) => {
        const v = data[i * step] / 255;
        const h = Math.max(4, v * 100);
        bar.style.height = h + "%";
        bar.classList.toggle("active", v > 0.08);
      });
    }

    function tickMeters() {
      paintMeter(vocalsAnalyser, vocalsBars);
      paintMeter(guitarAnalyser, guitarBars);
      rafId = requestAnimationFrame(tickMeters);
    }

    function syncStems(master = vocalsEl, slave = guitarEl) {
      const drift = Math.abs(master.currentTime - slave.currentTime);
      if (drift > SYNC_THRESHOLD) {
        slave.currentTime = master.currentTime;
      }
    }

    function setActiveListItem(index) {
      els.trackList.querySelectorAll("li").forEach((li, i) => {
        li.classList.toggle("active", i === index);
      });
    }

    function loadTrack(index, autoplay = false) {
      if (!manifest || index < 0 || index >= manifest.tracks.length) return;
      const track = manifest.tracks[index];
      currentIndex = index;

      vocalsEl.pause();
      guitarEl.pause();

      vocalsEl.src = enc(track.vocals);
      guitarEl.src = enc(track.guitar);

      els.trackTitle.textContent = track.num + ". " + track.title;
      els.trackSub.textContent = "Stems sincronizados — Raphael Rabello & Ney Matogrosso";
      els.npTitle.textContent = track.title;
      els.statusVocals.textContent = "A carregar voz…";
      els.statusGuitar.textContent = "A carregar violão…";
      setActiveListItem(index);

      let loaded = 0;
      const onMeta = () => {
        loaded++;
        duration = Math.max(vocalsEl.duration || 0, guitarEl.duration || 0);
        els.timeTotal.textContent = formatTime(duration);
        const durEl = els.trackList.querySelector(`[data-idx="${index}"] .track-dur`);
        if (durEl) durEl.textContent = formatTime(duration);
        if (loaded >= 2) {
          els.statusVocals.textContent = vocalsEl.muted ? "Voz (muda)" : "Voz ativa";
          els.statusGuitar.textContent = guitarEl.muted ? "Violão (mudo)" : "Violão ativo";
          if (autoplay) play();
        }
      };

      vocalsEl.onloadedmetadata = onMeta;
      guitarEl.onloadedmetadata = onMeta;
      vocalsEl.load();
      guitarEl.load();
    }

    async function play() {
      if (currentIndex < 0 && manifest?.tracks.length) {
        loadTrack(0, true);
        return;
      }
      await ensureAudioGraph();
      if (audioCtx.state === "suspended") await audioCtx.resume();

      const t = vocalsEl.currentTime;
      guitarEl.currentTime = t;

      try {
        await Promise.all([vocalsEl.play(), guitarEl.play()]);
        setPlayIcon(true);
        if (!rafId) tickMeters();
      } catch (err) {
        els.statusVocals.textContent = "Toque em Play (browser exige gesto do utilizador)";
      }
    }

    function pause() {
      vocalsEl.pause();
      guitarEl.pause();
      setPlayIcon(false);
    }

    function seekTo(ratio) {
      if (!duration) return;
      const t = ratio * duration;
      vocalsEl.currentTime = t;
      guitarEl.currentTime = t;
    }

    function renderPlaylist() {
      els.trackList.innerHTML = manifest.tracks.map((track, i) =>
        `<li data-idx="${i}">
          <span class="track-num">${track.num}</span>
          <span class="track-title">${track.title}</span>
          <span class="track-dur">—</span>
        </li>`
      ).join("");

      els.trackList.querySelectorAll("li").forEach((li) => {
        li.addEventListener("click", () => {
          const idx = Number(li.dataset.idx);
          if (idx === currentIndex && !vocalsEl.paused) {
            pause();
          } else {
            loadTrack(idx, true);
          }
        });
      });

      manifest.tracks.forEach((track, i) => {
        const probeV = new Audio();
        probeV.preload = "metadata";
        probeV.src = enc(track.vocals);
        probeV.addEventListener("loadedmetadata", () => {
          const durEl = els.trackList.querySelector(`[data-idx="${i}"] .track-dur`);
          if (durEl && probeV.duration) durEl.textContent = formatTime(probeV.duration);
        });
      });
    }

    vocalsEl.addEventListener("timeupdate", () => {
      syncStems(vocalsEl, guitarEl);
      els.timeCurrent.textContent = formatTime(vocalsEl.currentTime);
      const pct = duration ? (vocalsEl.currentTime / duration) * 100 : 0;
      els.progressFill.style.width = pct + "%";
    });

    vocalsEl.addEventListener("ended", () => {
      if (currentIndex < manifest.tracks.length - 1) {
        loadTrack(currentIndex + 1, true);
      } else {
        setPlayIcon(false);
      }
    });

    vocalsEl.addEventListener("play", () => setPlayIcon(true));
    vocalsEl.addEventListener("pause", () => {
      if (guitarEl.paused) setPlayIcon(false);
    });

    els.btnPlay.addEventListener("click", () => {
      if (vocalsEl.paused) play();
      else pause();
    });

    els.btnPrev.addEventListener("click", () => {
      if (vocalsEl.currentTime > 3) {
        seekTo(0);
      } else if (currentIndex > 0) {
        loadTrack(currentIndex - 1, true);
      }
    });

    els.btnNext.addEventListener("click", () => {
      if (currentIndex < manifest.tracks.length - 1) {
        loadTrack(currentIndex + 1, true);
      }
    });

    els.progressBar.addEventListener("click", (e) => {
      const rect = els.progressBar.getBoundingClientRect();
      seekTo((e.clientX - rect.left) / rect.width);
    });

    els.muteVocals.addEventListener("click", () => {
      vocalsEl.muted = !vocalsEl.muted;
      updateMuteButtons();
      applyStemGain();
      els.statusVocals.textContent = vocalsEl.muted ? "Voz (muda)" : "Voz ativa";
    });

    els.muteGuitar.addEventListener("click", () => {
      guitarEl.muted = !guitarEl.muted;
      updateMuteButtons();
      applyStemGain();
      els.statusGuitar.textContent = guitarEl.muted ? "Violão (mudo)" : "Violão ativo";
    });

    els.volVocals.addEventListener("input", applyStemGain);
    els.volGuitar.addEventListener("input", applyStemGain);

    fetch("manifest.json")
      .then((r) => {
        if (!r.ok) throw new Error("manifest");
        return r.json();
      })
      .then((data) => {
        manifest = data;
        els.albumTitle.textContent = data.album;
        els.albumArtists.textContent = data.artists;
        renderPlaylist();
        if (data.tracks.length) loadTrack(0, false);
      })
      .catch(() => {
        els.trackList.innerHTML = "<li class='loading'>Erro ao carregar manifest.json. Use um servidor HTTP (não abra file://).</li>";
      });

    updateMuteButtons();
    applyStemGain();
  </script>
</body>
</html>
