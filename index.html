<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>À Flor da Pele — Raphael Rabello & Ney Matogrosso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --peach: #e8a090;
      --peach-soft: rgba(232, 160, 144, 0.55);
      --peach-glow: rgba(232, 160, 144, 0.18);
      --ink: #0b0908;
      --glass: rgba(22, 16, 14, 0.7);
      --glass-strong: rgba(14, 10, 9, 0.9);
      --glass-border: rgba(232, 160, 144, 0.14);
      --text: #f5ebe6;
      --muted: rgba(245, 235, 230, 0.55);
      --vocals: #e8a090;
      --vocals-dim: rgba(232, 160, 144, 0.12);
      --guitar: #c9b896;
      --guitar-dim: rgba(201, 184, 150, 0.12);
      --accent: #e8a090;
      --player-h: 112px;
    }

    html, body { height: 100%; }

    body {
      font-family: "Outfit", system-ui, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background: var(--ink);
    }

    .scene {
      position: relative;
      min-height: 100vh;
      padding-bottom: var(--player-h);
    }

    .bg-blur {
      position: fixed;
      inset: -10%;
      z-index: 0;
      background: url("assets/capa.jpg") center center / cover no-repeat;
      filter: blur(48px) sepia(0.2) saturate(1.05) brightness(0.44);
      transform: scale(1.12);
      pointer-events: none;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse 85% 65% at 50% 38%, transparent 0%, rgba(0,0,0,.3) 65%, rgba(0,0,0,.78) 100%),
        linear-gradient(180deg, rgba(0,0,0,.2) 0%, rgba(0,0,0,.48) 55%, rgba(0,0,0,.85) 100%);
      pointer-events: none;
    }

    .waves {
      position: fixed;
      bottom: calc(var(--player-h) - 2px);
      left: 0;
      right: 0;
      height: 130px;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.32;
    }

    .waves svg {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 100%;
      animation: wave-drift 28s linear infinite;
    }

    .waves .w2 {
      animation-duration: 36s;
      animation-direction: reverse;
      opacity: 0.55;
    }

    @keyframes wave-drift {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    .app {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      min-height: calc(100vh - var(--player-h));
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 0;
      gap: 1.25rem;
      align-items: stretch;
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(18px) saturate(1.05);
      -webkit-backdrop-filter: blur(18px) saturate(1.05);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      max-height: calc(100vh - var(--player-h) - 2.5rem);
    }

    .cover-hero {
      padding: 1rem 1rem 0;
      flex-shrink: 0;
    }

    .cover-large {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      border: 1px solid var(--glass-border);
      box-shadow: 0 12px 36px rgba(0,0,0,.45);
    }

    .album-meta {
      padding: 1rem 1.15rem;
      border-bottom: 1px solid var(--glass-border);
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.55rem;
      font-weight: 600;
      font-style: italic;
      line-height: 1.15;
      color: var(--peach);
      letter-spacing: .01em;
    }

    .sidebar .artists {
      color: var(--muted);
      font-size: .8rem;
      font-weight: 300;
      margin-top: .35rem;
      line-height: 1.4;
    }

    .sidebar .year {
      color: rgba(232,160,144,.5);
      font-size: .68rem;
      margin-top: .35rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .track-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: .5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--peach-glow) transparent;
    }

    .track-list li {
      display: grid;
      grid-template-columns: 26px 1fr auto;
      gap: .6rem;
      align-items: center;
      padding: .5rem .6rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s, transform .12s;
    }

    .track-list li:hover {
      background: rgba(232,160,144,.08);
    }

    .track-list li.active {
      background: rgba(232,160,144,.14);
      border: 1px solid rgba(232,160,144,.2);
    }

    .track-list li.active .track-title { color: var(--peach); }

    .track-num {
      color: var(--muted);
      font-size: .75rem;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .track-title {
      font-size: .84rem;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-dur {
      color: var(--muted);
      font-size: .7rem;
      font-variant-numeric: tabular-nums;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
      max-height: calc(100vh - var(--player-h) - 2.5rem);
      overflow: hidden;
    }

    .now-title {
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid var(--glass-border);
    }

    .now-title-top {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: .75rem 1rem;
    }

    .fs-chrome-left {
      display: flex;
      flex: 1;
      align-items: flex-start;
      min-width: 0;
      gap: .75rem;
    }

    .fs-chrome-right {
      display: flex;
      align-items: flex-start;
      gap: .3rem;
      flex-shrink: 0;
    }

    .now-title h2 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
    }

    .now-title p {
      color: var(--muted);
      font-size: .8rem;
      margin-top: .25rem;
      font-weight: 300;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .viz-picker {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0;
      flex-shrink: 0;
      min-width: 0;
    }

    .viz-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: .15rem;
    }

    .viz-row-sep {
      width: 1px;
      height: 14px;
      background: rgba(232,160,144,.2);
      margin: 0 .12rem;
      flex-shrink: 0;
    }

    .viz-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color .12s, background .12s;
      flex-shrink: 0;
    }

    .viz-btn svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .viz-btn:hover { color: var(--text); }

    .viz-btn.active {
      background: rgba(232,160,144,.18);
      color: var(--peach);
    }

    .fs-controls {
      display: none;
      align-items: center;
      gap: .55rem;
      margin-top: .45rem;
    }

    .fs-ctrl {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .12s, transform .1s;
    }

    .fs-ctrl:hover { color: var(--peach); }
    .fs-ctrl:active { transform: scale(.92); }
    .fs-ctrl svg { width: 17px; height: 17px; fill: currentColor; }

    .fs-ctrl-play {
      width: 34px;
      height: 34px;
      background: var(--peach);
      color: var(--ink);
      border-radius: 50%;
      box-shadow: 0 0 14px var(--peach-glow);
    }

    .fs-ctrl-play:hover {
      background: #f0b0a0;
      color: var(--ink);
    }

    .fs-ctrl-play svg { width: 16px; height: 16px; }

    .btn-fs {
      background: transparent;
      border: none;
      color: var(--muted);
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color .12s, background .12s;
      flex-shrink: 0;
    }

    .btn-fs:hover {
      color: var(--text);
      background: rgba(255,255,255,.06);
    }

    .btn-fs svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .btn-fs-exit { display: none; }

    .scene.fs-viz { padding-bottom: 0; }

    .scene.fs-viz .bg-blur {
      opacity: 0.12;
      filter: blur(56px) sepia(0.12) saturate(0.85) brightness(0.18);
    }

    .scene.fs-viz .bg-overlay {
      background: rgba(3, 2, 2, 0.96);
    }

    .scene.fs-viz .waves { display: none; }

    .scene.fs-viz .app {
      position: fixed;
      inset: 0;
      z-index: 90;
      max-width: none;
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      display: block;
    }

    .scene.fs-viz .sidebar { display: none; }

    .scene.fs-viz .main {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      max-height: none;
      height: 100vh;
      border-radius: 0;
      border: none;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow: none;
    }

    .scene.fs-viz .now-title {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      padding: 1rem 1.25rem 2rem;
      border: none;
      background: linear-gradient(180deg, rgba(3,2,2,.95) 0%, rgba(3,2,2,.55) 65%, transparent 100%);
      opacity: 0;
      transition: opacity .35s ease;
      pointer-events: none;
    }

    .scene.fs-viz.viz-ui-visible .now-title {
      opacity: 1;
      pointer-events: auto;
    }

    .scene.fs-viz .now-title-top {
      align-items: flex-start;
      width: 100%;
      gap: 1rem;
    }

    .scene.fs-viz .fs-chrome-left {
      flex-direction: column;
      align-items: flex-start;
      gap: .5rem;
    }

    .scene.fs-viz .viz-picker { align-items: flex-start; }

    .scene.fs-viz .viz-row { justify-content: flex-start; }

    .scene.fs-viz #track-sub { display: none; }

    .scene.fs-viz #track-title {
      font-size: clamp(1.05rem, 2.2vw, 1.45rem);
    }

    .scene.fs-viz .fs-controls { display: flex; }

    .scene.fs-viz .btn-fs-expand { display: none; }
    .scene.fs-viz .btn-fs-exit { display: inline-flex; }

    .stem-mute-toggle {
      display: none;
      position: absolute;
      top: .45rem;
      z-index: 120;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(232,160,144,.18);
      color: var(--muted);
      width: 26px;
      height: 26px;
      padding: 0;
      border-radius: 6px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: color .12s, background .12s, border-color .12s;
    }

    .stem-mute-toggle:hover {
      color: var(--text);
      background: rgba(232,160,144,.12);
    }

    .stem-mute-toggle.muted {
      color: var(--peach);
      border-color: rgba(232,160,144,.35);
      opacity: .65;
    }

    .stem-mute-toggle svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .stem-mute-toggle .icon-muted { display: none; }
    .stem-mute-toggle.muted .icon-on { display: none; }
    .stem-mute-toggle.muted .icon-muted { display: block; }

    .scene.fs-viz .stem-mute-toggle {
      display: inline-flex;
      position: fixed;
      top: 200px;
      z-index: 250;
      pointer-events: auto;
      background: rgba(3, 2, 2, 0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .scene.fs-viz .stem-panel.vocals .stem-mute-toggle {
      right: calc(50% + .3rem);
      left: auto;
    }

    .scene.fs-viz .stem-panel.guitar .stem-mute-toggle {
      left: calc(50% + .3rem);
      right: auto;
    }

    .stem-panel.vocals .stem-mute-toggle { right: .5rem; }
    .stem-panel.guitar .stem-mute-toggle { left: .5rem; }

    .scene.fs-viz .stem-head,
    .scene.fs-viz .stem-status { display: none; }

    .scene.fs-viz .stems-split {
      flex: 1;
      min-height: 0;
      height: 100vh;
      width: 100%;
    }

    .scene.fs-viz .stem-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
      padding: 0;
      background: transparent !important;
      overflow: hidden;
    }

    .scene.fs-viz .stem-panel.vocals {
      border-right: 1px solid rgba(232,160,144,.07);
    }

    .scene.fs-viz .viz-area {
      flex: 1;
      min-height: 0;
      height: 100%;
      padding: 0;
      position: relative;
    }

    .scene.fs-viz .meter-wrap {
      position: absolute;
      inset: 0;
      min-height: 0;
      height: 100%;
      align-items: flex-end;
      gap: 2px;
      padding: 0;
    }

    .scene.fs-viz .meter-bar {
      align-self: flex-end;
      border-radius: 0;
    }

    .scene.fs-viz .viz-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 0;
      border-radius: 0;
    }

    .scene.fs-viz .player { display: none; }

    .stems-split {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 260px;
    }

    .stem-panel {
      display: flex;
      flex-direction: column;
      padding: 1rem 1.15rem 1.15rem;
      position: relative;
      overflow: hidden;
    }

    .stem-panel.vocals {
      border-right: 1px solid var(--glass-border);
      background: linear-gradient(165deg, var(--vocals-dim) 0%, transparent 60%);
    }

    .stem-panel.guitar {
      background: linear-gradient(195deg, var(--guitar-dim) 0%, transparent 60%);
    }

    .stem-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      margin-bottom: .7rem;
    }

    .stem-label {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-size: .9rem;
      font-weight: 500;
      letter-spacing: .03em;
    }

    .stem-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
    }

    .vocals .stem-dot { background: var(--vocals); color: var(--vocals); }
    .guitar .stem-dot { background: var(--guitar); color: var(--guitar); }

    .stem-actions {
      display: flex;
      align-items: center;
      gap: .45rem;
    }

    .btn-mute {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--glass-border);
      color: var(--text);
      border-radius: 999px;
      padding: .28rem .7rem;
      font-size: .74rem;
      cursor: pointer;
      transition: background .15s, opacity .15s;
      font-family: inherit;
    }

    .btn-mute:hover { background: rgba(232,160,144,.12); }
    .btn-mute.muted { opacity: .5; text-decoration: line-through; }

    .stem-vol {
      width: 68px;
      accent-color: var(--peach);
      cursor: pointer;
      opacity: .85;
    }

    .viz-area {
      flex: 1;
      position: relative;
      min-height: 130px;
      padding: .4rem 0;
    }

    .meter-wrap {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      width: 100%;
      height: 100%;
      min-height: 130px;
    }

    .viz-canvas {
      display: none;
      width: 100%;
      height: 100%;
      min-height: 130px;
      position: absolute;
      inset: 0;
      border-radius: 6px;
    }

    [data-viz="bars"] .viz-canvas { display: none !important; }
    [data-viz="bars"] .meter-wrap { display: flex; }

    [data-viz]:not([data-viz="bars"]) .meter-wrap { display: none; }
    [data-viz]:not([data-viz="bars"]) .viz-fx { display: block; }

    .stem-panel.vocals.psyche-active {
      background: linear-gradient(165deg, rgba(232,160,144,.11) 0%, transparent 65%);
    }

    .stem-panel.guitar.psyche-active {
      background: linear-gradient(195deg, rgba(201,184,150,.1) 0%, transparent 65%);
    }

    .meter-bar {
      flex: 1;
      background: rgba(255,255,255,.06);
      border-radius: 3px 3px 0 0;
      min-height: 4px;
      transition: height .05s linear, background .1s;
    }

    .vocals .meter-bar.active {
      background: linear-gradient(180deg, var(--peach), rgba(232,160,144,.4));
      box-shadow: 0 0 8px var(--peach-glow);
    }

    .guitar .meter-bar.active {
      background: linear-gradient(180deg, var(--guitar), rgba(201,184,150,.35));
    }

    .stem-status {
      color: var(--muted);
      font-size: .72rem;
      margin-top: .45rem;
      font-weight: 300;
    }

    /* —— Player bar —— */
    .player {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--player-h);
      z-index: 50;
      background: var(--glass-strong);
      backdrop-filter: blur(24px) saturate(1.05);
      -webkit-backdrop-filter: blur(24px) saturate(1.05);
      border-top: 1px solid var(--glass-border);
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
    }

    .np-mini {
      display: flex;
      align-items: center;
      gap: .7rem;
      min-width: 0;
    }

    .np-badge {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 12px rgba(0,0,0,.35);
    }

    .np-badge img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .np-text { min-width: 0; }
    .np-text .t {
      font-size: .84rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .np-text .s {
      font-size: .7rem;
      color: var(--muted);
      font-weight: 300;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .4rem;
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .ctrl-btns {
      display: flex;
      align-items: center;
      gap: .85rem;
    }

    .btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: .2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .12s, transform .1s;
    }

    .btn:hover { color: var(--peach); }
    .btn:active { transform: scale(.92); }
    .btn svg { width: 18px; height: 18px; fill: currentColor; }

    .btn-play {
      width: 44px;
      height: 44px;
      background: var(--peach);
      color: var(--ink);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--peach-glow);
    }

    .btn-play:hover {
      background: #f0b0a0;
      color: var(--ink);
      transform: scale(1.05);
    }

    .btn-play svg { width: 20px; height: 20px; }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: .5rem;
      width: 100%;
    }

    .time {
      font-size: .68rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 34px;
    }

    .time.end { text-align: right; }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,.1);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar:hover { height: 6px; }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--peach), #f0c4b8);
      border-radius: 2px;
      pointer-events: none;
      box-shadow: 0 0 8px var(--peach-glow);
    }

    .mix-hint {
      text-align: right;
      font-size: .7rem;
      color: var(--muted);
      font-weight: 300;
    }

    .mix-hint span { color: var(--peach); }

    .loading {
      padding: 2rem;
      color: var(--muted);
      text-align: center;
      font-weight: 300;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        padding: .75rem .75rem 0;
      }
      .sidebar,
      .main { max-height: none; }
      .cover-hero { padding: .75rem .75rem 0; }
      .cover-large { max-width: 220px; margin: 0 auto; }
      .stems-split { grid-template-columns: 1fr; }
      .stem-panel.vocals { border-right: none; border-bottom: 1px solid var(--glass-border); }
      .now-title-top { flex-direction: column; }
      .fs-chrome-left { flex-direction: column; width: 100%; }
      .viz-picker { align-items: flex-start; }
      .viz-row { justify-content: flex-start; }
      .player {
        grid-template-columns: 1fr;
        height: auto;
        padding: .75rem 1rem 1rem;
        gap: .5rem;
      }
      .mix-hint { display: none; }
      .np-mini { justify-content: center; }
    }
  </style>
</head>
<body>

  <script>
    const METER_BARS = 24;
    const SYNC_THRESHOLD = 0.04;
    const VIZ_COLORS = { vocals: "#e8a090", guitar: "#c9b896" };
    const WARM_HUE = { vocals: 12, guitar: 38 };

    function warmHue(base, mix, anim, energy, spread = 34) {
      const wave = ((anim * 0.04) % 1) * spread * 0.35;
      return base + mix * spread * 0.85 + wave + energy * spread * 0.22;
    }

    function warmTrail(alpha) {
      return `rgba(12, 9, 8, ${alpha})`;
    }

    let manifest = null;
    let currentIndex = -1;
    let duration = 0;
    let rafId = null;
    let vizMode = "bars";
    let fsUiTimer = null;

    const vocalsEl = new Audio();
    const guitarEl = new Audio();
    vocalsEl.preload = "auto";
    guitarEl.preload = "auto";
    vocalsEl._userMuted = false;
    guitarEl._userMuted = false;

    let audioCtx = null;
    let vocalsAnalyser = null;
    let guitarAnalyser = null;

    const els = {
      trackList: document.getElementById("track-list"),
      trackTitle: document.getElementById("track-title"),
      trackSub: document.getElementById("track-sub"),
      npTitle: document.getElementById("np-title"),
      npStems: document.getElementById("np-stems"),
      mixLabel: document.getElementById("mix-label"),
      btnPlay: document.getElementById("btn-play"),
      btnPrev: document.getElementById("btn-prev"),
      btnNext: document.getElementById("btn-next"),
      iconPlay: document.getElementById("icon-play"),
      iconPause: document.getElementById("icon-pause"),
      progressBar: document.getElementById("progress-bar"),
      progressFill: document.getElementById("progress-fill"),
      timeCurrent: document.getElementById("time-current"),
      timeTotal: document.getElementById("time-total"),
      muteVocals: document.getElementById("mute-vocals"),
      muteGuitar: document.getElementById("mute-guitar"),
      muteFsVocals: document.getElementById("mute-fs-vocals"),
      muteFsGuitar: document.getElementById("mute-fs-guitar"),
      volVocals: document.getElementById("vol-vocals"),
      volGuitar: document.getElementById("vol-guitar"),
      statusVocals: document.getElementById("status-vocals"),
      statusGuitar: document.getElementById("status-guitar"),
      meterVocals: document.getElementById("meter-vocals"),
      meterGuitar: document.getElementById("meter-guitar"),
      fxVocals: document.getElementById("fx-vocals"),
      fxGuitar: document.getElementById("fx-guitar"),
      scene: document.querySelector(".scene"),
      stemVocals: document.querySelector(".stem-panel.vocals"),
      stemGuitar: document.querySelector(".stem-panel.guitar"),
      albumTitle: document.getElementById("album-title"),
      albumArtists: document.getElementById("album-artists"),
      btnFsEnter: document.getElementById("btn-fs-enter"),
      btnFsExit: document.getElementById("btn-fs-exit"),
      stemsSplit: document.getElementById("stems-split"),
      fsPrev: document.getElementById("fs-prev"),
      fsPlay: document.getElementById("fs-play"),
      fsNext: document.getElementById("fs-next"),
      fsIconPlay: document.getElementById("fs-icon-play"),
      fsIconPause: document.getElementById("fs-icon-pause"),
    };

    const vocalsBars = buildMeter(els.meterVocals);
    const guitarBars = buildMeter(els.meterGuitar);
    const allCanvases = [els.fxVocals, els.fxGuitar];
    const particlePools = { vocals: null, guitar: null };

    const VIZ_MODES = new Set(["bars", "wave", "spectrum", "mandala", "psyche", "tunnel", "particles"]);
    const TRIPPY_MODES = new Set(["mandala", "psyche", "tunnel", "particles"]);
    function buildMeter(container) {
      container.innerHTML = "";
      const bars = [];
      for (let i = 0; i < METER_BARS; i++) {
        const bar = document.createElement("div");
        bar.className = "meter-bar";
        bar.style.height = "4px";
        container.appendChild(bar);
        bars.push(bar);
      }
      return bars;
    }

    function formatTime(s) {
      if (!s || !isFinite(s)) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ":" + String(sec).padStart(2, "0");
    }

    function enc(path) {
      return path.split("/").map(encodeURIComponent).join("/");
    }

    function isStemMuted(el) {
      return Boolean(el._userMuted);
    }

    function setStemMuted(el, volInput, muted) {
      el._userMuted = muted;
      if (el._gain) {
        el.muted = false;
        el._gain.gain.value = muted ? 0 : Number(volInput.value);
      } else {
        el.muted = muted;
        el.volume = muted ? 0 : Number(volInput.value);
      }
    }

    function updateMixLabel() {
      const parts = [];
      if (!isStemMuted(vocalsEl) && els.volVocals.value > 0) parts.push("Voz");
      if (!isStemMuted(guitarEl) && els.volGuitar.value > 0) parts.push("Violão");
      const label = parts.length ? parts.join(" + ") : "Silêncio";
      els.mixLabel.textContent = label;
      els.npStems.textContent = label;
    }

    function setPlayIcon(playing) {
      els.iconPlay.style.display = playing ? "none" : "block";
      els.iconPause.style.display = playing ? "block" : "none";
      if (els.fsIconPlay) {
        els.fsIconPlay.style.display = playing ? "none" : "block";
        els.fsIconPause.style.display = playing ? "block" : "none";
      }
    }

    async function ensureAudioGraph() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const vSource = audioCtx.createMediaElementSource(vocalsEl);
      const gSource = audioCtx.createMediaElementSource(guitarEl);

      vocalsAnalyser = audioCtx.createAnalyser();
      guitarAnalyser = audioCtx.createAnalyser();
      vocalsAnalyser.fftSize = 256;
      guitarAnalyser.fftSize = 256;
      vocalsAnalyser.smoothingTimeConstant = 0.75;
      guitarAnalyser.smoothingTimeConstant = 0.75;

      const vGain = audioCtx.createGain();
      const gGain = audioCtx.createGain();

      vSource.connect(vocalsAnalyser);
      vocalsAnalyser.connect(vGain);
      vGain.connect(audioCtx.destination);

      gSource.connect(guitarAnalyser);
      guitarAnalyser.connect(gGain);
      gGain.connect(audioCtx.destination);

      vocalsEl._gain = vGain;
      guitarEl._gain = gGain;
      applyStemGain();
    }

    function applyStemGain() {
      setStemMuted(vocalsEl, els.volVocals, isStemMuted(vocalsEl));
      setStemMuted(guitarEl, els.volGuitar, isStemMuted(guitarEl));
      updateMixLabel();
    }

    function updateMuteButtons() {
      const vMuted = isStemMuted(vocalsEl);
      const gMuted = isStemMuted(guitarEl);
      els.muteVocals.classList.toggle("muted", vMuted);
      els.muteGuitar.classList.toggle("muted", gMuted);
      els.muteVocals.setAttribute("aria-pressed", String(vMuted));
      els.muteGuitar.setAttribute("aria-pressed", String(gMuted));
      els.muteVocals.textContent = vMuted ? "Mudo ✓" : "Mudo";
      els.muteGuitar.textContent = gMuted ? "Mudo ✓" : "Mudo";
      if (els.muteFsVocals) {
        els.muteFsVocals.classList.toggle("muted", vMuted);
        els.muteFsVocals.setAttribute("aria-pressed", String(vMuted));
      }
      if (els.muteFsGuitar) {
        els.muteFsGuitar.classList.toggle("muted", gMuted);
        els.muteFsGuitar.setAttribute("aria-pressed", String(gMuted));
      }
    }

    function toggleVocalsMute() {
      setStemMuted(vocalsEl, els.volVocals, !isStemMuted(vocalsEl));
      updateMuteButtons();
      updateMixLabel();
      els.statusVocals.textContent = isStemMuted(vocalsEl) ? "Voz (muda)" : "Voz ativa";
    }

    function toggleGuitarMute() {
      setStemMuted(guitarEl, els.volGuitar, !isStemMuted(guitarEl));
      updateMuteButtons();
      updateMixLabel();
      els.statusGuitar.textContent = isStemMuted(guitarEl) ? "Violão (mudo)" : "Violão ativo";
    }

    function resizeCanvases() {
      const dpr = window.devicePixelRatio || 1;
      allCanvases.forEach((canvas) => {
        const area = canvas.parentElement;
        if (!area) return;
        const rect = area.getBoundingClientRect();
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
      });
    }

    function paintBars(analyser, bars) {
      if (!analyser) return;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const step = Math.max(1, Math.floor(data.length / bars.length));
      bars.forEach((bar, i) => {
        const v = data[i * step] / 255;
        bar.style.height = Math.max(4, v * 100) + "%";
        bar.classList.toggle("active", v > 0.08);
      });
    }

    function paintWave(analyser, canvas, color) {
      if (!analyser || !canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const dpr = window.devicePixelRatio || 1;
      const data = new Uint8Array(analyser.fftSize);
      analyser.getByteTimeDomainData(data);
      ctx.clearRect(0, 0, w, h);
      ctx.lineWidth = 2 * dpr;
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 6 * dpr;
      ctx.beginPath();
      const slice = w / data.length;
      for (let i = 0; i < data.length; i++) {
        const v = (data[i] - 128) / 128;
        const y = h / 2 + v * h * 0.4;
        const x = i * slice;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function paintSpectrum(analyser, canvas, color) {
      if (!analyser || !canvas) return;
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const n = 56;
      const step = Math.max(1, Math.floor(data.length / n));
      const barW = w / n;
      ctx.clearRect(0, 0, w, h);
      for (let i = 0; i < n; i++) {
        const v = data[i * step] / 255;
        const bh = v * h * 0.92;
        const x = i * barW;
        const grad = ctx.createLinearGradient(x, h, x, h - bh);
        grad.addColorStop(0, color + "18");
        grad.addColorStop(1, color);
        ctx.fillStyle = grad;
        ctx.fillRect(x + 1, h - bh, Math.max(1, barW - 2), bh);
      }
    }

    function paintMandala(analyser, canvas, color) {
      if (!analyser || !canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const maxR = Math.min(w, h) * 0.44;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const n = 64;
      const step = Math.max(1, Math.floor(data.length / n));
      ctx.clearRect(0, 0, w, h);
      for (let ring = 0; ring < 3; ring++) {
        for (let i = 0; i < n; i++) {
          const v = data[((i + ring * 7) % n) * step] / 255;
          const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
          const r0 = maxR * (0.18 + ring * 0.14);
          const r1 = r0 + v * maxR * 0.22;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(angle) * r0, cy + Math.sin(angle) * r0);
          ctx.lineTo(cx + Math.cos(angle) * r1, cy + Math.sin(angle) * r1);
          ctx.strokeStyle = color;
          ctx.globalAlpha = 0.35 + v * 0.65;
          ctx.lineWidth = (2 + ring) * dpr;
          ctx.shadowColor = color;
          ctx.shadowBlur = v * 10 * dpr;
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    function paintPsyche(analyser, canvas, hueOffset) {
      if (!analyser || !canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const n = 36;
      const step = Math.max(1, Math.floor(data.length / n));
      let energy = 0;
      for (let i = 0; i < n; i++) energy += data[i * step];
      energy /= n * 255;

      ctx.fillStyle = warmTrail(0.18);
      ctx.fillRect(0, 0, w, h);

      const slices = 8;
      const t = performance.now() * 0.001;
      const baseHue = hueOffset;
      const radius = Math.min(w, h) * (0.12 + energy * 0.34);

      ctx.globalCompositeOperation = "lighter";
      for (let s = 0; s < slices; s++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate((Math.PI * 2 / slices) * s);
        ctx.beginPath();
        for (let i = 0; i <= n; i++) {
          const v = data[(i % n) * step] / 255;
          const angle = (i / n) * Math.PI * 0.85;
          const r = radius * (0.35 + v * 1.1);
          const x = Math.cos(angle) * r;
          const y = Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        const hue = warmHue(baseHue, s / slices, t, energy, 28);
        ctx.strokeStyle = `hsla(${hue}, 88%, 65%, ${0.55 + energy * 0.4})`;
        ctx.lineWidth = (1.5 + energy * 2.5) * dpr;
        ctx.shadowColor = `hsl(${hue}, 95%, 58%)`;
        ctx.shadowBlur = (8 + energy * 18) * dpr;
        ctx.stroke();
        ctx.scale(1, -1);
        ctx.stroke();
        ctx.restore();
      }

      const pulse = radius * (0.5 + energy * 0.8);
      const ringGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulse);
      ringGrad.addColorStop(0, `hsla(${warmHue(baseHue, 0.2, t, energy, 18)}, 90%, 70%, ${0.12 + energy * 0.2})`);
      ringGrad.addColorStop(0.6, `hsla(${warmHue(baseHue, 0.75, t, energy, 22)}, 78%, 55%, 0.06)`);
      ringGrad.addColorStop(1, "transparent");
      ctx.fillStyle = ringGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, pulse, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = "source-over";
      ctx.shadowBlur = 0;
    }

    function paintAurora(analyser, canvas, hueOffset) {
      if (!analyser || !canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width;
      const h = canvas.height;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const n = 48;
      const step = Math.max(1, Math.floor(data.length / n));
      let energy = 0;
      for (let i = 0; i < n; i++) energy += data[i * step];
      energy /= n * 255;

      ctx.fillStyle = warmTrail(0.14);
      ctx.fillRect(0, 0, w, h);

      const t = performance.now() * 0.0012;
      const bands = 6;
      ctx.globalCompositeOperation = "lighter";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      for (let b = 0; b < bands; b++) {
        const yBase = h * (0.18 + b * 0.11);
        const hue = warmHue(hueOffset, b / bands, t, energy, 26);
        ctx.beginPath();
        for (let x = 0; x <= w; x += 3 * dpr) {
          const fi = Math.min(n - 1, Math.floor((x / w) * n));
          const v = data[fi * step] / 255;
          const wave = Math.sin(x * 0.009 + t * (1.1 + b * 0.22) + b * 1.4) * (18 + v * 72) * dpr;
          const y = yBase + wave;
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `hsla(${hue}, 86%, 62%, ${0.28 + energy * 0.45})`;
        ctx.lineWidth = (2.5 + energy * 4 + b * 0.4) * dpr;
        ctx.shadowColor = `hsl(${hue}, 100%, 65%)`;
        ctx.shadowBlur = (10 + energy * 22) * dpr;
        ctx.stroke();
      }
      ctx.globalCompositeOperation = "source-over";
      ctx.shadowBlur = 0;
    }

    function paintPlasma(analyser, canvas, hueOffset) {
      if (!analyser || !canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width;
      const h = canvas.height;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const n = 16;
      const step = Math.max(1, Math.floor(data.length / n));
      let energy = 0;
      for (let i = 0; i < n; i++) energy += data[i * step];
      energy /= n * 255;
      const bass = data[2 * step] / 255;
      const mid = data[7 * step] / 255;
      const treble = data[14 * step] / 255;

      const t = performance.now() * 0.0025;
      const block = Math.max(4, Math.floor(5 * dpr));
      for (let y = 0; y < h; y += block) {
        for (let x = 0; x < w; x += block) {
          const xf = (x / w) * 9 + bass * 2;
          const yf = (y / h) * 7 + mid * 1.5;
          let v = Math.sin(xf + t + treble * 3)
                + Math.sin(yf + t * 0.75 + energy * 2)
                + Math.sin((xf + yf) * 0.55 + t * 0.5)
                + Math.sin(Math.sqrt(xf * xf + yf * yf) + t * 1.1 + energy * 4);
          v = (v + 4) / 8;
          const hue = warmHue(hueOffset, v, t, energy, 36);
          const light = 28 + v * 38 + energy * 18;
          ctx.fillStyle = `hsl(${hue}, ${74 + energy * 16}%, ${light}%)`;
          ctx.fillRect(x, y, block, block);
        }
      }
    }

    function paintTunnel(analyser, canvas, hueOffset) {
      if (!analyser || !canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const maxR = Math.min(w, h) * 0.48;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const n = 32;
      const step = Math.max(1, Math.floor(data.length / n));
      let energy = 0;
      for (let i = 0; i < n; i++) energy += data[i * step];
      energy /= n * 255;

      ctx.fillStyle = warmTrail(0.22);
      ctx.fillRect(0, 0, w, h);

      const t = performance.now() * 0.003;
      const rings = 28;
      ctx.globalCompositeOperation = "lighter";

      for (let r = rings; r >= 0; r--) {
        const fi = r % n;
        const v = data[fi * step] / 255;
        const progress = r / rings;
        const pulse = Math.sin(t * 2.2 + r * 0.35) * 0.08;
        const radius = maxR * progress * (0.75 + v * 0.55 + pulse + energy * 0.15);
        const hue = warmHue(hueOffset, v + progress * 0.25, t + r * 0.05, energy, 30);
        const tilt = t * 0.4 + r * 0.07 + v * 0.5;
        const rx = radius * (1.05 + v * 0.25);
        const ry = radius * (0.42 + v * 0.18);

        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, tilt, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${hue}, 92%, 58%, ${0.12 + v * 0.55 + (1 - progress) * 0.2})`;
        ctx.lineWidth = (1 + v * 3.5 + energy * 2) * dpr;
        ctx.shadowColor = `hsl(${hue}, 100%, 55%)`;
        ctx.shadowBlur = v * 14 * dpr;
        ctx.stroke();

        if (r % 4 === 0 && v > 0.35) {
          const dotR = (2 + v * 5) * dpr;
          const dx = cx + Math.cos(t + r) * rx * 0.85;
          const dy = cy + Math.sin(t * 1.3 + r) * ry * 0.85;
          ctx.beginPath();
          ctx.arc(dx, dy, dotR, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${hue}, 100%, 72%, ${0.5 + v * 0.4})`;
          ctx.fill();
        }
      }
      ctx.globalCompositeOperation = "source-over";
      ctx.shadowBlur = 0;
    }

    function ensureParticles(poolKey) {
      if (!particlePools[poolKey]) {
        particlePools[poolKey] = Array.from({ length: 48 }, (_, i) => ({
          x: Math.random(),
          y: Math.random(),
          band: i % 16,
          size: 1 + Math.random() * 2,
        }));
      }
      return particlePools[poolKey];
    }

    function paintParticles(analyser, canvas, color, poolKey) {
      if (!analyser || !canvas) return;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const w = canvas.width;
      const h = canvas.height;
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      const pool = ensureParticles(poolKey);

      ctx.fillStyle = warmTrail(0.28);
      ctx.fillRect(0, 0, w, h);

      const step = Math.max(1, Math.floor(data.length / 16));
      ctx.globalCompositeOperation = "lighter";
      pool.forEach((p) => {
        const v = data[p.band * step] / 255;
        const targetY = 1 - v * 0.92;
        p.y += (targetY - p.y) * 0.14;
        p.x += (Math.random() - 0.5) * 0.006 * (0.3 + v);
        if (p.x < 0) p.x = 1;
        if (p.x > 1) p.x = 0;

        const px = p.x * w;
        const py = p.y * h;
        const size = (p.size + v * 5) * dpr;
        const grad = ctx.createRadialGradient(px, py, 0, px, py, size * 2);
        grad.addColorStop(0, color);
        grad.addColorStop(1, "transparent");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(px, py, size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalCompositeOperation = "source-over";
    }

    function clearFxCanvases() {
      allCanvases.forEach((canvas) => {
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      });
    }

    function paintFx(analyser, canvas, color, poolKey, hueOffset) {
      if (!analyser || !canvas) return;
      switch (vizMode) {
        case "wave": paintWave(analyser, canvas, color); break;
        case "spectrum": paintSpectrum(analyser, canvas, color); break;
        case "mandala": paintMandala(analyser, canvas, color); break;
        case "psyche": paintPsyche(analyser, canvas, hueOffset); break;
        case "tunnel": paintTunnel(analyser, canvas, hueOffset); break;
        case "particles": paintParticles(analyser, canvas, color, poolKey); break;
      }
    }

    function tickViz() {
      if (vizMode === "bars") {
        paintBars(vocalsAnalyser, vocalsBars);
        paintBars(guitarAnalyser, guitarBars);
      } else {
        paintFx(vocalsAnalyser, els.fxVocals, VIZ_COLORS.vocals, "vocals", WARM_HUE.vocals);
        paintFx(guitarAnalyser, els.fxGuitar, VIZ_COLORS.guitar, "guitar", WARM_HUE.guitar);
      }
      rafId = requestAnimationFrame(tickViz);
    }

    function isFsViz() {
      return els.scene.classList.contains("fs-viz");
    }

    function showFsUi() {
      if (!isFsViz()) return;
      els.scene.classList.add("viz-ui-visible");
      clearTimeout(fsUiTimer);
      fsUiTimer = setTimeout(() => {
        els.scene.classList.remove("viz-ui-visible");
      }, 2800);
    }

    async function enterFsViz() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (_) {
        /* CSS-only fallback */
      }
      els.scene.classList.add("fs-viz");
      showFsUi();
      requestAnimationFrame(() => {
        resizeCanvases();
        setTimeout(resizeCanvases, 120);
      });
    }

    async function exitFsViz() {
      els.scene.classList.remove("fs-viz", "viz-ui-visible");
      clearTimeout(fsUiTimer);
      try {
        if (document.fullscreenElement) await document.exitFullscreen();
      } catch (_) {}
      resizeCanvases();
    }

    async function toggleFsViz() {
      if (isFsViz()) await exitFsViz();
      else await enterFsViz();
    }

    function setVizMode(mode) {
      if (!VIZ_MODES.has(mode)) mode = "bars";
      vizMode = mode;
      localStorage.setItem("vizMode", mode);
      els.scene.dataset.viz = mode;
      document.querySelectorAll(".viz-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.viz === mode);
      });
      els.stemVocals.classList.toggle("psyche-active", TRIPPY_MODES.has(mode));
      els.stemGuitar.classList.toggle("psyche-active", TRIPPY_MODES.has(mode));
      clearFxCanvases();
      resizeCanvases();
    }

    function syncStems(master = vocalsEl, slave = guitarEl) {
      const drift = Math.abs(master.currentTime - slave.currentTime);
      if (drift > SYNC_THRESHOLD) {
        slave.currentTime = master.currentTime;
      }
    }

    function setActiveListItem(index) {
      els.trackList.querySelectorAll("li").forEach((li, i) => {
        li.classList.toggle("active", i === index);
      });
    }

    function loadTrack(index, autoplay = false) {
      if (!manifest || index < 0 || index >= manifest.tracks.length) return;
      const track = manifest.tracks[index];
      currentIndex = index;

      vocalsEl.pause();
      guitarEl.pause();

      vocalsEl.src = enc(track.vocals);
      guitarEl.src = enc(track.guitar);

      els.trackTitle.textContent = track.num + ". " + track.title;
      els.trackSub.textContent = "Stems sincronizados — Raphael Rabello & Ney Matogrosso";
      els.npTitle.textContent = track.title;
      els.statusVocals.textContent = "A carregar voz…";
      els.statusGuitar.textContent = "A carregar violão…";
      setActiveListItem(index);

      let loaded = 0;
      const onMeta = () => {
        loaded++;
        duration = Math.max(vocalsEl.duration || 0, guitarEl.duration || 0);
        els.timeTotal.textContent = formatTime(duration);
        const durEl = els.trackList.querySelector(`[data-idx="${index}"] .track-dur`);
        if (durEl) durEl.textContent = formatTime(duration);
        if (loaded >= 2) {
          els.statusVocals.textContent = isStemMuted(vocalsEl) ? "Voz (muda)" : "Voz ativa";
          els.statusGuitar.textContent = isStemMuted(guitarEl) ? "Violão (mudo)" : "Violão ativo";
          if (autoplay) play();
        }
      };

      vocalsEl.onloadedmetadata = onMeta;
      guitarEl.onloadedmetadata = onMeta;
      vocalsEl.load();
      guitarEl.load();
    }

    async function play() {
      if (currentIndex < 0 && manifest?.tracks.length) {
        loadTrack(0, true);
        return;
      }
      await ensureAudioGraph();
      if (audioCtx.state === "suspended") await audioCtx.resume();

      const t = vocalsEl.currentTime;
      guitarEl.currentTime = t;

      try {
        await Promise.all([vocalsEl.play(), guitarEl.play()]);
        setPlayIcon(true);
        if (!rafId) tickViz();
      } catch (err) {
        els.statusVocals.textContent = "Toque em Play (browser exige gesto do utilizador)";
      }
    }

    function pause() {
      vocalsEl.pause();
      guitarEl.pause();
      setPlayIcon(false);
    }

    function seekTo(ratio) {
      if (!duration) return;
      const t = ratio * duration;
      vocalsEl.currentTime = t;
      guitarEl.currentTime = t;
    }

    function renderPlaylist() {
      els.trackList.innerHTML = manifest.tracks.map((track, i) => {
        const dur = track.duration_sec ? formatTime(track.duration_sec) : "—";
        return `<li data-idx="${i}">
          <span class="track-num">${track.num}</span>
          <span class="track-title">${track.title}</span>
          <span class="track-dur">${dur}</span>
        </li>`;
      }).join("");

      els.trackList.querySelectorAll("li").forEach((li) => {
        li.addEventListener("click", () => {
          const idx = Number(li.dataset.idx);
          if (idx === currentIndex && !vocalsEl.paused) {
            pause();
          } else {
            loadTrack(idx, true);
          }
        });
      });
    }

    vocalsEl.addEventListener("timeupdate", () => {
      syncStems(vocalsEl, guitarEl);
      els.timeCurrent.textContent = formatTime(vocalsEl.currentTime);
      const pct = duration ? (vocalsEl.currentTime / duration) * 100 : 0;
      els.progressFill.style.width = pct + "%";
    });

    vocalsEl.addEventListener("ended", () => {
      if (currentIndex < manifest.tracks.length - 1) {
        loadTrack(currentIndex + 1, true);
      } else {
        setPlayIcon(false);
      }
    });

    vocalsEl.addEventListener("play", () => setPlayIcon(true));
    vocalsEl.addEventListener("pause", () => {
      if (guitarEl.paused) setPlayIcon(false);
    });

    els.btnPlay.addEventListener("click", () => {
      if (vocalsEl.paused) play();
      else pause();
    });

    els.btnPrev.addEventListener("click", () => {
      if (vocalsEl.currentTime > 3) {
        seekTo(0);
      } else if (currentIndex > 0) {
        loadTrack(currentIndex - 1, true);
      }
    });

    els.btnNext.addEventListener("click", () => {
      if (currentIndex < manifest.tracks.length - 1) {
        loadTrack(currentIndex + 1, true);
      }
    });

    els.progressBar.addEventListener("click", (e) => {
      const rect = els.progressBar.getBoundingClientRect();
      seekTo((e.clientX - rect.left) / rect.width);
    });

    els.muteVocals.addEventListener("click", toggleVocalsMute);
    els.muteGuitar.addEventListener("click", toggleGuitarMute);

    els.muteFsVocals.addEventListener("click", (e) => {
      e.stopPropagation();
      showFsUi();
      toggleVocalsMute();
    });

    els.muteFsGuitar.addEventListener("click", (e) => {
      e.stopPropagation();
      showFsUi();
      toggleGuitarMute();
    });

    els.volVocals.addEventListener("input", applyStemGain);
    els.volGuitar.addEventListener("input", applyStemGain);

    document.querySelectorAll(".viz-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        setVizMode(btn.dataset.viz);
        showFsUi();
      });
    });

    els.btnFsEnter.addEventListener("click", enterFsViz);
    els.btnFsExit.addEventListener("click", exitFsViz);
    els.stemsSplit.addEventListener("dblclick", toggleFsViz);
    els.scene.addEventListener("mousemove", showFsUi);
    els.fsPrev.addEventListener("click", () => { showFsUi(); els.btnPrev.click(); });
    els.fsPlay.addEventListener("click", () => { showFsUi(); els.btnPlay.click(); });
    els.fsNext.addEventListener("click", () => { showFsUi(); els.btnNext.click(); });

    document.addEventListener("fullscreenchange", () => {
      if (!document.fullscreenElement && isFsViz()) {
        els.scene.classList.remove("fs-viz", "viz-ui-visible");
        clearTimeout(fsUiTimer);
      }
      resizeCanvases();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "f" && !e.ctrlKey && !e.metaKey && !e.altKey) {
        const tag = document.activeElement?.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        e.preventDefault();
        toggleFsViz();
      }
    });

    setVizMode("bars");
    resizeCanvases();
    window.addEventListener("resize", resizeCanvases);

    fetch("manifest.json")
      .then((r) => {
        if (!r.ok) throw new Error("manifest");
        return r.json();
      })
      .then((data) => {
        manifest = data;
        els.albumTitle.textContent = data.album;
        els.albumArtists.textContent = data.artists;
        renderPlaylist();
        if (data.tracks.length) {
          const first = data.tracks[0];
          if (first.duration_sec) {
            duration = first.duration_sec;
            els.timeTotal.textContent = formatTime(duration);
          }
          loadTrack(0, false);
        }
      })
      .catch(() => {
        els.trackList.innerHTML = "<li class='loading'>Erro ao carregar manifest.json. Use um servidor HTTP (não abra file://).</li>";
      });

    updateMuteButtons();
    applyStemGain();
  </script>
</body>
